// ============================================================
// SIMULATION ENGINE
// ============================================================
function runSimulation(species, region, initPop, sexRatio, ageStructure, years, numRuns = 200) {
  const sp = SPECIES[species].params;
  const reg = REGIONS[region];
  const adjSurvAdult = sp.survivalAdult * (1 - reg.roadDensity * 0.15) * (1 - reg.conflictRisk * 0.1);
  const adjSurvJuv = sp.survivalJuv * (1 - reg.roadDensity * 0.2) * (1 - reg.conflictRisk * 0.15);
  const adjFecundity = sp.litterSize * reg.preyDensity * (1 - reg.competition * 0.3);
  const carryingCapacity = Math.floor(reg.area_km2 / sp.homeRange * (reg.preyDensity + 0.2));
  const allRuns = [];

  for (let r = 0; r < numRuns; r++) {
    const trajectory = [];
    let nFemales = Math.round(initPop * sexRatio);
    let nMales = initPop - nFemales;
    let pop = initPop;
    let juveniles = Math.round(pop * (ageStructure === "young" ? 0.4 : ageStructure === "mixed" ? 0.25 : 0.1));
    let subadults = Math.round(pop * (ageStructure === "young" ? 0.35 : ageStructure === "mixed" ? 0.25 : 0.2));
    let adults = pop - juveniles - subadults;
    let effectiveN = Math.min(nFemales, nMales) * 2;
    let inbreedingCoeff = 1 / (2 * effectiveN + 1);

    for (let y = 0; y <= years; y++) {
      trajectory.push({
        year: y, population: Math.max(0, pop),
        inbreeding: Math.min(1, inbreedingCoeff), effectiveN: Math.max(0, effectiveN),
      });
      if (pop <= 0) {
        for (let fy = y + 1; fy <= years; fy++)
          trajectory.push({ year: fy, population: 0, inbreeding: inbreedingCoeff, effectiveN: 0 });
        break;
      }
      const stochAdult = adjSurvAdult + (Math.random() - 0.5) * 0.08;
      const stochJuv = adjSurvJuv + (Math.random() - 0.5) * 0.12;
      const ddMort = sp.densityDep * pop;
      const inbreedingPenalty = 1 - (inbreedingCoeff * 0.5);
      const adultsSurvived = Math.round((adults + subadults) * Math.max(0.3, stochAdult - ddMort));
      const juvSurvived = Math.round(juveniles * Math.max(0.2, stochJuv * inbreedingPenalty - ddMort));
      const promoteToAdult = Math.round(juvSurvived * 0.6);
      const breedingFemales = Math.round(nFemales * (adults / Math.max(1, pop)) * Math.min(1, nMales / Math.max(1, nFemales * 0.3)));
      const envStoch = 0.8 + Math.random() * 0.4;
      const preyEffect = reg.preyDensity > 0.5 ? 1 : reg.preyDensity * 1.5 + 0.25;
      const newborns = Math.round(breedingFemales * adjFecundity * 0.5 * envStoch * preyEffect * inbreedingPenalty);
      const immigrants = Math.random() < reg.connectivity * 0.08 ? Math.round(Math.random() * 2 + 1) : 0;
      const catastrophe = Math.random() < 0.05 ? 0.7 : 1.0;
      juveniles = Math.round(newborns * catastrophe);
      adults = Math.round((adultsSurvived - promoteToAdult + promoteToAdult + immigrants) * catastrophe);
      pop = Math.max(0, adults + juveniles);
      nFemales = Math.round(pop * (sexRatio * 0.95 + Math.random() * 0.1));
      nMales = pop - nFemales;
      if (pop > carryingCapacity) {
        const excess = pop - carryingCapacity;
        pop = carryingCapacity;
        adults = Math.max(0, adults - Math.round(excess * 0.6));
        juveniles = Math.max(0, juveniles - Math.round(excess * 0.4));
        nFemales = Math.round(pop * sexRatio);
        nMales = pop - nFemales;
      }
      effectiveN = pop > 1 ? (4 * nFemales * nMales) / (nFemales + nMales) + immigrants * 2 : 0;
      if (effectiveN > 0)
        inbreedingCoeff = inbreedingCoeff + (1 / (2 * effectiveN)) * (1 - inbreedingCoeff);
    }
    allRuns.push(trajectory);
  }

  const stats = [];
  for (let y = 0; y <= years; y++) {
    const pops = allRuns.map(r => r[y]?.population || 0).sort((a, b) => a - b);
    const inb = allRuns.map(r => r[y]?.inbreeding || 0).sort((a, b) => a - b);
    const efn = allRuns.map(r => r[y]?.effectiveN || 0).sort((a, b) => a - b);
    const n = pops.length;
    stats.push({
      year: y,
      median: pops[Math.floor(n * 0.5)],
      mean: Math.round(pops.reduce((a, b) => a + b, 0) / n),
      p10: pops[Math.floor(n * 0.1)],
      p25: pops[Math.floor(n * 0.25)],
      p75: pops[Math.floor(n * 0.75)],
      p90: pops[Math.floor(n * 0.9)],
      extinctionProb: pops.filter(p => p === 0).length / n,
      inbreedingMedian: inb[Math.floor(n * 0.5)],
      inbreedingP25: inb[Math.floor(n * 0.25)],
      inbreedingP75: inb[Math.floor(n * 0.75)],
      effectiveN: efn[Math.floor(n * 0.5)],
    });
  }
  return { stats, carryingCapacity };
}

// ============================================================
// VERDICT ENGINE
// ============================================================
function getVerdict(stats, species, region, initPop) {
  const sp = SPECIES[species].params;
  const final = stats[stats.length - 1];
  const extProb = final.extinctionProb;
  const medianFinal = final.median;
  const inbreeding = final.inbreedingMedian;
  const meetsMVP = medianFinal >= sp.minViablePop;
  const meetsLongterm = medianFinal >= sp.mvpLongterm;
  let verdict, level, detail;

  if (extProb > 0.5 || medianFinal < 10) {
    level = "doomed"; verdict = "High extinction risk";
    detail = `This scenario has a ${Math.round(extProb * 100)}% probability of extinction within the projection period. The median final population of ${medianFinal} individuals is well below the minimum viable population threshold of ${sp.minViablePop}.${inbreeding > 0.2 ? ` Inbreeding depression (F = ${inbreeding.toFixed(3)}) would severely compromise fitness.` : ""} Consider a larger founding population, a region with better habitat connectivity, or supplemental translocations.`;
  } else if (extProb > 0.15 || !meetsMVP || inbreeding > 0.15) {
    level = "marginal"; verdict = "Marginal viability";
    detail = `This scenario shows marginal viability with a ${Math.round(extProb * 100)}% extinction probability. The median population reaches ${medianFinal} by year ${stats.length - 1}, ${meetsMVP ? "meeting" : "falling short of"} the short-term MVP of ${sp.minViablePop}.${inbreeding > 0.1 ? ` The projected inbreeding coefficient of ${inbreeding.toFixed(3)} indicates significant genetic erosion.` : ""} Success would depend heavily on supplemental translocations and favorable environmental conditions.`;
  } else {
    level = "viable"; verdict = "Viable population trajectory";
    detail = `This scenario projects a self-sustaining population reaching a median of ${medianFinal} individuals by year ${stats.length - 1}, with only ${Math.round(extProb * 100)}% extinction risk. ${meetsLongterm ? `The population exceeds the long-term MVP of ${sp.mvpLongterm}, suggesting genetic viability.` : `However, the population remains below the long-term MVP of ${sp.mvpLongterm}; periodic genetic rescue translocations would be recommended.`} The inbreeding coefficient of ${inbreeding.toFixed(3)} is ${inbreeding < 0.05 ? "within acceptable limits" : "moderate and warrants monitoring"}.`;
  }
  return { verdict, level, detail, extProb, medianFinal, inbreeding, meetsMVP, meetsLongterm };
}

function PredatorSimulator() {
  const [species, setSpecies] = useState(null);
  const [region, setRegion] = useState(null);
  const [initPop, setInitPop] = useState(20);
  const [sexRatio, setSexRatio] = useState(0.5);
  const [ageStructure, setAgeStructure] = useState("mixed");
  const [years, setYears] = useState(25);
  const [showConflict, setShowConflict] = useState(false);
  const [simResults, setSimResults] = useState(null);
  const [activeTab, setActiveTab] = useState("population");
  const [showAssumptions, setShowAssumptions] = useState(false);
  const [isRunning, setIsRunning] = useState(false);
  const resultsRef = useRef(null);

  const handleRun = useCallback(() => {
    if (!species || !region) return;
    setIsRunning(true);
    setTimeout(() => {
      const result = runSimulation(species, region, initPop, sexRatio, ageStructure, years);
      const verdict = getVerdict(result.stats, species, region, initPop);
      setSimResults({ ...result, verdict });
      setShowConflict(true);
      setIsRunning(false);
      setTimeout(() => resultsRef.current?.scrollIntoView({ behavior: "smooth", block: "start" }), 100);

                      <Line type="monotone" dataKey="p90" stroke={sp.color} strokeWidth={1} strokeDasharray="4 3" dot={false} name="90th pctl" opacity={0.4} />
                      <ReferenceLine y={sp.params.minViablePop} stroke={T.green} strokeDasharray="6 4" strokeWidth={1.5}
                        label={{ value: `MVP (${sp.params.minViablePop})`, position: "right", fontSize: 10, fill: T.green }} />
                      <ReferenceLine y={simResults.carryingCapacity} stroke={T.sand} strokeDasharray="6 4" strokeWidth={1}
                        label={{ value: `K (${simResults.carryingCapacity})`, position: "right", fontSize: 10, fill: T.sand }} />
                    </ComposedChart>
                  </ResponsiveContainer>
                </>
              )}

              {activeTab === "inbreeding" && (
                <>
                  <h3 style={{ fontFamily: T.serif, fontSize: "1.05rem", marginBottom: "0.25rem" }}>Inbreeding coefficient (F) trajectory</h3>
                  <p style={{ fontSize: "0.72rem", color: T.ink3, marginBottom: "1rem" }}>
                    Wright (1931) approximation: ΔF = 1/(2Nₑ) per generation. F &gt; 0.10 indicates significant inbreeding depression risk.
                  </p>
                  <ResponsiveContainer width="100%" height={320}>
                    <ComposedChart data={simResults.stats} margin={{ top: 5, right: 30, bottom: 20, left: 10 }}>
                      <CartesianGrid strokeDasharray="3 3" stroke={T.fog2} />
                      <XAxis dataKey="year" tick={{ fontSize: 11, fill: T.ink3 }} />
                      <YAxis domain={[0, "auto"]} tick={{ fontSize: 11, fill: T.ink3 }}
                        label={{ value: "Inbreeding coefficient (F)", angle: -90, position: "insideLeft", offset: 0, fontSize: 10, fill: T.ink3 }} />
                      <Tooltip contentStyle={{ background: T.white, border: `1px solid ${T.fog3}`, borderRadius: 8, fontSize: "0.78rem" }} />
                      <Area type="monotone" dataKey="inbreedingP25" fill="none" stroke="none" />
                      <Area type="monotone" dataKey="inbreedingP75" fill="#b5402a" stroke="none" fillOpacity={0.1} name="IQR" />
                      <Line type="monotone" dataKey="inbreedingMedian" stroke={T.rust} strokeWidth={2.5} dot={false} name="Median F" />
                      <ReferenceLine y={0.10} stroke={T.amber} strokeDasharray="6 4"
                        label={{ value: "Concern (0.10)", position: "right", fontSize: 10, fill: T.amber }} />
                      <ReferenceLine y={0.25} stroke={T.red} strokeDasharray="6 4"
                        label={{ value: "Severe (0.25)", position: "right", fontSize: 10, fill: T.red }} />
                    </ComposedChart>
                  </ResponsiveContainer>
                </>
              )}

              {activeTab === "extinction" && (
                <>
                  <h3 style={{ fontFamily: T.serif, fontSize: "1.05rem", marginBottom: "0.25rem" }}>Cumulative extinction probability</h3>
                  <p style={{ fontSize: "0.72rem", color: T.ink3, marginBottom: "1rem" }}>
                    Proportion of 200 simulation runs where the population reaches zero by each year.
                  </p>
                  <ResponsiveContainer width="100%" height={320}>
                    <ComposedChart data={simResults.stats} margin={{ top: 5, right: 30, bottom: 20, left: 10 }}>
                      <CartesianGrid strokeDasharray="3 3" stroke={T.fog2} />
                      <XAxis dataKey="year" tick={{ fontSize: 11, fill: T.ink3 }} />
                      <YAxis domain={[0, 1]} tickFormatter={v => `${Math.round(v * 100)}%`} tick={{ fontSize: 11, fill: T.ink3 }}
                        label={{ value: "P(extinction)", angle: -90, position: "insideLeft", offset: 0, fontSize: 10, fill: T.ink3 }} />
                      <Tooltip contentStyle={{ background: T.white, border: `1px solid ${T.fog3}`, borderRadius: 8, fontSize: "0.78rem" }}
                        formatter={v => [`${(v * 100).toFixed(1)}%`, "Extinction probability"]} />
                      <Area type="monotone" dataKey="extinctionProb" fill={T.red} fillOpacity={0.1} stroke={T.red} strokeWidth={2} name="P(extinction)" />
                      <ReferenceLine y={0.05} stroke={T.green} strokeDasharray="6 4"
                        label={{ value: "5% threshold", position: "right", fontSize: 10, fill: T.green }} />
                    </ComposedChart>
                  </ResponsiveContainer>
                </>
              )}
            </div>

            {/* Model transparency */}
            <div style={{ background: T.fog, borderRadius: 12, padding: "1.25rem 1.5rem", border: `1px solid ${T.fog3}`, marginBottom: "2rem" }}>
              <button onClick={() => setShowAssumptions(!showAssumptions)} style={{
                display: "flex", alignItems: "center", justifyContent: "space-between",
                width: "100%", background: "none", border: "none", cursor: "pointer", padding: 0,
              }}>
                <div>
                  <Label style={{ marginBottom: "0.15rem" }}>Model Transparency</Label>
                  <h3 style={{ fontFamily: T.serif, fontSize: "1.05rem", color: T.ink }}>Assumptions, parameters &amp; citations</h3>
                </div>
                <span style={{ fontFamily: T.mono, fontSize: "1.4rem", color: T.accent, transform: showAssumptions ? "rotate(45deg)" : "none", transition: "transform 0.2s" }}>+</span>
              </button>

              {showAssumptions && (
                <div style={{ marginTop: "1.25rem" }}>
                  <div style={{ marginBottom: "1.5rem" }}>
                    <h4 style={{ fontSize: "0.85rem", fontWeight: 600, marginBottom: "0.5rem" }}>Population dynamics model</h4>
                    <p style={{ fontSize: "0.82rem", color: T.ink2, lineHeight: 1.7 }}>
                      This simulator uses a modified Leslie matrix approach with three age classes (juvenile, subadult, adult)
                      and stochastic environmental and demographic variation. Each simulation runs 200 independent Monte Carlo
                      replicates to generate confidence intervals. Key features include density-dependent mortality, Allee
                      effects via mate limitation, inbreeding depression on juvenile survival (following Ralls et al. 1988),
                      stochastic immigration via habitat corridors, and catastrophic events (disease, severe winter) at
                      approximately 5% annual probability.
                    </p>
                  </div>

                  <div style={{ marginBottom: "1.5rem" }}>
                    <h4 style={{ fontSize: "0.85rem", fontWeight: 600, marginBottom: "0.5rem" }}>
                      {sp.icon} {sp.name} parameters
                    </h4>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "0.3rem 1.5rem", fontSize: "0.78rem" }}>
                      {[
                        ["Adult survival rate", sp.params.survivalAdult],
                        ["Juvenile survival rate", sp.params.survivalJuv],
                        ["Mean litter size", sp.params.litterSize],
                        ["Breeding age (years)", sp.params.breedingAge],
                        ["Max lifespan (years)", sp.params.maxAge],
                        ["Home range (km²)", sp.params.homeRange],
                        ["Dispersal rate", sp.params.dispersalRate],
                        ["Short-term MVP", sp.params.minViablePop],
                        ["Long-term MVP", sp.params.mvpLongterm],
                      ].map(([label, val]) => (
                        <div key={label} style={{ display: "flex", justifyContent: "space-between", padding: "0.35rem 0", borderBottom: `1px solid ${T.fog2}` }}>
                          <span style={{ color: T.ink2 }}>{label}</span>
                          <span style={{ fontFamily: T.mono, color: T.accent }}>{val}</span>
                        </div>
                      ))}
                    </div>
                  </div>

                  <div style={{ marginBottom: "1.5rem" }}>
                    <h4 style={{ fontSize: "0.85rem", fontWeight: 600, marginBottom: "0.5rem" }}>Region adjustments ({reg.name})</h4>
                    <p style={{ fontSize: "0.78rem", color: T.ink2, lineHeight: 1.6 }}>
                      Base survival rates are modified by road density (up to 15–20% reduction), human conflict risk
                      (up to 10–15% reduction), and prey availability. Fecundity is scaled by prey density index and
                      competitive pressure. Carrying capacity is derived from regional area divided by species home range,
                      adjusted for prey density.
                    </p>
                  </div>

                  <div style={{ marginBottom: "1rem" }}>
                    <h4 style={{ fontSize: "0.85rem", fontWeight: 600, marginBottom: "0.5rem" }}>Literature cited</h4>
                    <div style={{ fontSize: "0.75rem", color: T.ink2, lineHeight: 1.8 }}>
                      {sp.citations.map(c => (
                        <p key={c.id} style={{ marginBottom: "0.25rem", paddingLeft: "1rem", textIndent: "-1rem" }}>{c.text}</p>
                      ))}
                      <p style={{ marginBottom: "0.25rem", paddingLeft: "1rem", textIndent: "-1rem" }}>Franklin, I.R. (1980). Evolutionary change in small populations. In Conservation Biology: An Evolutionary-Ecological Perspective. Sinauer.</p>
                      <p style={{ marginBottom: "0.25rem", paddingLeft: "1rem", textIndent: "-1rem" }}>Ralls, K., et al. (1988). Estimates of lethal equivalents and the cost of inbreeding in mammals. Conserv. Biol. 2(2): 185–193.</p>
                      <p style={{ marginBottom: "0.25rem", paddingLeft: "1rem", textIndent: "-1rem" }}>Wright, S. (1931). Evolution in Mendelian populations. Genetics 16(2): 97–159.</p>
                    </div>
                  </div>

                  <div style={{ padding: "0.75rem 1rem", background: "rgba(196,138,26,0.08)", borderRadius: 8, border: "1px solid rgba(196,138,26,0.2)" }}>
                    <p style={{ fontSize: "0.78rem", color: T.ink2, lineHeight: 1.6 }}>
                      <strong style={{ color: T.ink }}>Important caveats.</strong> This is a simplified educational model.
                      Real-world reintroduction planning requires spatial population viability analysis (PVA) using software
                      such as Vortex or HexSim, field-validated habitat models, detailed livestock conflict assessments,
                      genetic sampling from source populations, and multi-stakeholder regulatory review. Parameter values
                      here are drawn from published literature but represent broad estimates, not site-specific field data.
                      Use this tool to build intuition, not to make management decisions.
                    </p>
                  </div>
                </div>
              )}
            </div>

            {/* Footer attribution */}
            <div style={{ textAlign: "center", padding: "1.5rem 0 2rem", borderTop: `1px solid ${T.fog2}`, fontSize: "0.72rem", color: T.ink3 }}>
              <p>Predator Reintroduction Scenario Simulator · <a href="https://rewildutah.com" style={{ color: T.accent, borderBottom: `1px solid ${T.accent}` }}>rewildutah.com</a></p>
              <p style={{ marginTop: "0.25rem" }}>Hansen, A. (2025). A project of <a href="https://rewildgenomics.com" style={{ color: T.accent, borderBottom: `1px solid ${T.accent}` }}>Rewild Genomics LLC</a>.</p>
            </div>

          </div>
        )}
      </div>
    </div>
  );
}

// Mount app
const container = document.getElementById('app');
container.innerHTML = '';
const root = ReactDOM.createRoot(container);
root.render(React.createElement(PredatorSimulator));
</script>

<script>
// Nav scroll effect
window.addEventListener('scroll', () => {
  document.getElementById('nav').classList.toggle('scrolled', window.scrollY > 20);
});
</script>
</body>
</html>
